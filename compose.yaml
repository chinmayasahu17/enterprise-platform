services:
  platform-postgres:
    image: postgres:16-alpine
    container_name: platform-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: platform
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    networks:
      - platform-network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform -d platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  platform-kafka:
    image: apache/kafka:3.7.2
    container_name: platform-kafka
    restart: unless-stopped

    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://platform-kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@platform-kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3

    networks:
      - platform-network

  platform-redis:
    image: redis:7-alpine
    container_name: platform-redis
    restart: unless-stopped

    ports:
      - "6379:6379"

    networks:
      - platform-network

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ingestion-service:
    image: enterprise-platform-ingestion:1.0.0

    container_name: ingestion-service
    restart: unless-stopped

    ports:
      - "8180:8080"
      - "8181:8081"

    env_file:
      - ./app-services/ingestion-service/.env

    depends_on:
      platform-postgres:
        condition: service_healthy
      platform-kafka:
        condition: service_started

    networks:
      - platform-network

  processing-service:
    image: enterprise-platform-processing:1.0.0

    container_name: processing-service
    restart: unless-stopped

    ports:
      - "8280:8080"
      - "8281:8081"

    env_file:
      - ./app-services/processing-service/.env

    depends_on:
      platform-postgres:
        condition: service_healthy
      platform-kafka:
        condition: service_started

    networks:
      - platform-network

  notification-service:
    image: enterprise-platform-notification:1.0.0
    container_name: notification-service
    restart: unless-stopped
    ports:
      - "8380:8080"
      - "8381:8081"

    env_file:
      - ./app-services/notification-service/.env

    depends_on:
      platform-kafka:
        condition: service_started

    networks:
      - platform-network

  gateway:
    image: enterprise-platform-gateway:1.0.0
    container_name: gateway
    restart: unless-stopped

    ports:
      - "8080:8080"
      - "8081:8081"

    env_file:
      - ./platform-infra/gateway/.env

    depends_on:
      platform-redis:
        condition: service_healthy
      ingestion-service:
        condition: service_started
      processing-service:
        condition: service_started
      notification-service:
        condition: service_started

    networks:
      - platform-network

volumes:
  postgres-data:

networks:
  platform-network:
    driver: bridge