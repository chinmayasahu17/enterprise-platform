apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-deployment
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: platform-postgres
        image: postgres:16-alpine
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 5432

        env:
          - name: POSTGRES_DB
            value: platform
          - name: POSTGRES_USER
            value: platform
          - name: POSTGRES_PASSWORD
            value: platform

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"

        readinessProbe:
          tcpSocket:
            port: 5432
          initialDelaySeconds: 5
          periodSeconds: 5

        livenessProbe:
          tcpSocket:
            port: 5432
          initialDelaySeconds: 10
          periodSeconds: 10

        volumes:
          - name: postgres-data
            persistentVolumeClaim:
              claimName: postgres-pvc
        